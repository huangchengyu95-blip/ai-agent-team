<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Team 工作看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --bg-card-hover: #1f2335;
            --border: #2a2d3e;
            --text-primary: #e2e8f0;
            --text-secondary: #8892a4;
            --text-muted: #4a5568;
            --accent-blue: #4f9cf9;
            --accent-green: #48bb78;
            --accent-yellow: #f6c90e;
            --accent-red: #fc8181;
            --accent-purple: #9f7aea;
            --accent-orange: #f6ad55;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        /* ========== 顶部标题栏 ========== */
        .header {
            text-align: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .last-updated {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ========== 统计数字 ========== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ========== 分区标题 ========== */
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ========== Agent 标签页（核心新功能） ========== */
        .agent-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }

        .agent-tabs::-webkit-scrollbar { display: none; }

        .agent-tab {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .agent-tab:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .agent-tab.active {
            background: rgba(79, 156, 249, 0.15);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .agent-tab .tab-count {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 0 5px;
            font-size: 10px;
            min-width: 18px;
            text-align: center;
        }

        .agent-tab.active .tab-count {
            background: rgba(79, 156, 249, 0.2);
        }

        /* ========== Agent 状态卡片（新：带点击高亮） ========== */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        @media (min-width: 600px) {
            .agents-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
            opacity: 0.7;
        }

        .agent-card.status-running::before { background: var(--accent-yellow); }
        .agent-card.status-idle::before    { background: var(--accent-green); }
        .agent-card.status-waiting::before { background: var(--text-muted); }
        .agent-card.status-error::before   { background: var(--accent-red); }

        /* 选中态 */
        .agent-card.selected {
            border-color: var(--accent-blue);
            background: var(--bg-card-hover);
            box-shadow: 0 0 0 1px var(--accent-blue);
        }

        .agent-emoji { font-size: 22px; margin-bottom: 6px; display: block; }

        .agent-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border-radius: 20px;
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .status-badge.running { background: rgba(246,201,14,.15); color: var(--accent-yellow); border: 1px solid rgba(246,201,14,.3); }
        .status-badge.idle    { background: rgba(72,187,120,.15);  color: var(--accent-green);  border: 1px solid rgba(72,187,120,.3); }
        .status-badge.waiting { background: rgba(74,85,104,.3);    color: var(--text-secondary); border: 1px solid var(--border); }
        .status-badge.error   { background: rgba(252,129,129,.15); color: var(--accent-red);    border: 1px solid rgba(252,129,129,.3); }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .status-badge.running .dot { width:6px; height:6px; border-radius:50%; background:var(--accent-yellow); animation:pulse 1.5s infinite; }

        .agent-result {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .agent-time { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

        /* ========== 活动日志 ========== */
        .log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .log-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2px 8px;
        }

        .activity-log {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .log-item {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-start;
            transition: background 0.15s;
        }

        .log-item:last-child { border-bottom: none; }
        .log-item:hover { background: var(--bg-card-hover); }

        .log-agent-badge {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            flex-shrink: 0;
            margin-top: 1px;
            font-weight: 500;
        }

        .badge-trend    { background: rgba(79,156,249,.15);  color: var(--accent-blue); }
        .badge-pm       { background: rgba(159,122,234,.15); color: var(--accent-purple); }
        .badge-reviewer { background: rgba(246,173,85,.15);  color: var(--accent-orange); }
        .badge-engineer { background: rgba(72,187,120,.15);  color: var(--accent-green); }

        .log-content { flex: 1; min-width: 0; }

        .log-message {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.5;
            word-break: break-word;
        }

        .log-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .log-empty {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ========== 产品创意列表（新功能） ========== */
        .ideas-list {
            margin-bottom: 16px;
        }

        .idea-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .idea-rating {
            font-size: 13px;
            flex-shrink: 0;
            min-width: 50px;
            text-align: center;
        }

        .idea-info { flex: 1; min-width: 0; }

        .idea-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .idea-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .idea-status-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .badge-4star { background: rgba(246,173,85,.15); color: var(--accent-orange); border: 1px solid rgba(246,173,85,.3); }
        .badge-5star { background: rgba(72,187,120,.15);  color: var(--accent-green); border: 1px solid rgba(72,187,120,.3); }
        .badge-3star { background: rgba(79,156,249,.15);  color: var(--accent-blue);  border: 1px solid rgba(79,156,249,.3); }
        .badge-low   { background: rgba(74,85,104,.3);    color: var(--text-secondary); border: 1px solid var(--border); }

        /* ========== 快捷链接 ========== */
        .quick-links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

        .quick-link {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .quick-link:hover { border-color: var(--accent-blue); background: var(--bg-card-hover); }
        .quick-link .link-icon { font-size: 18px; }
        .quick-link .link-info { flex: 1; }
        .quick-link .link-title { font-size: 13px; font-weight: 500; }
        .quick-link .link-desc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
        .quick-link .link-arrow { color: var(--text-muted); font-size: 14px; }

        .quick-link.disabled { opacity: 0.45; cursor: not-allowed; }
        .quick-link.disabled:hover { border-color: var(--border); background: var(--bg-card); }

        /* ========== 加载 / 错误 ========== */
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

        .error-box { background: rgba(252,129,129,.1); border: 1px solid rgba(252,129,129,.3); border-radius: 10px; padding: 16px; color: var(--accent-red); font-size: 13px; text-align: center; }

        /* ========== 底部 ========== */
        .footer { text-align: center; padding: 14px 0 6px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🤖 AI Agent Team 工作看板</h1>
        <div class="subtitle">
            <span class="last-updated" id="lastUpdated">加载中...</span>
            <button class="refresh-btn" onclick="loadStatus()">↻ 刷新</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="loading">
            <div class="loading-spinner"></div>
            正在加载最新状态...
        </div>
    </div>

    <div class="footer">每30秒自动刷新 · 由 AI Agent Team 自动维护</div>

<script>
    const REFRESH_INTERVAL = 30000;

    const AGENT_CONFIG = {
        trend_tracker:    { emoji: '🔍', label: '追踪员',  badgeClass: 'badge-trend',    shortName: '追踪员' },
        product_manager:  { emoji: '💡', label: '产品经理', badgeClass: 'badge-pm',       shortName: '产品经理' },
        product_reviewer: { emoji: '🔬', label: '评审员',  badgeClass: 'badge-reviewer',  shortName: '评审员' },
        engineer:         { emoji: '🔧', label: '工程师',  badgeClass: 'badge-engineer',  shortName: '工程师' }
    };

    const STATUS_TEXT = { running: '运行中', idle: '空闲', waiting: '等待中', error: '出错' };

    // 当前选中的 agent 过滤器（null = 全部）
    let selectedAgent = null;
    // 全局日志数据（用于切换 tab 时重渲染）
    let globalLogs = [];
    let globalIdeas = [];

    // ========== 加载数据 ==========
    async function loadStatus() {
        try {
            let statusData = null;
            for (const path of ['../status.json', './status.json', 'status.json']) {
                try {
                    const res = await fetch(path + '?t=' + Date.now());
                    if (res.ok) { statusData = await res.json(); break; }
                } catch(e) { continue; }
            }
            if (!statusData) throw new Error('无法加载 status.json 文件');
            renderDashboard(statusData);
        } catch (err) {
            document.getElementById('mainContent').innerHTML = `
                <div class="error-box">⚠️ 加载状态数据失败<br>
                <small style="margin-top:8px;display:block;opacity:.8">${err.message}</small></div>`;
        }
    }

    // ========== 主渲染 ==========
    function renderDashboard(data) {
        const lastUpdated = data.last_updated ? formatTime(data.last_updated) : '从未更新';
        document.getElementById('lastUpdated').textContent = '最后更新：' + lastUpdated;

        globalLogs = data.activity_log || [];
        globalIdeas = extractIdeas(globalLogs);

        // 计算各 agent 日志条数
        const counts = {};
        for (const key of Object.keys(AGENT_CONFIG)) {
            counts[key] = globalLogs.filter(l => l.agent === key).length;
        }

        document.getElementById('mainContent').innerHTML = `
            <!-- 统计 -->
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-number">${data.stats?.total_pipeline_runs || 0}</div>
                    <div class="stat-label">总运行次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${globalIdeas.length || data.stats?.total_ideas_generated || 0}</div>
                    <div class="stat-label">产品创意</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${data.stats?.total_demos_built || 0}</div>
                    <div class="stat-label">Demo 数量</div>
                </div>
            </div>

            <!-- Agent 卡片（可点击过滤） -->
            <div class="section-title">🤖 Agent 状态 <span style="color:var(--text-muted);font-size:10px;font-weight:400">点击查看该 Agent 的活动记录</span></div>
            <div class="agents-grid" id="agentsGrid">
                ${renderAgentCards(data.agents || {}, counts)}
            </div>

            <!-- 过滤 Tab -->
            <div class="agent-tabs" id="agentTabs">
                ${renderTabs(counts)}
            </div>

            <!-- 活动日志 -->
            <div class="log-header">
                <div class="section-title" style="margin-bottom:0">📋 活动记录</div>
                <div class="log-count" id="logCount"></div>
            </div>
            <div class="activity-log" id="activityLog"></div>

            <!-- 产品创意列表 -->
            ${globalIdeas.length > 0 ? `
            <div class="section-title" style="margin-top:4px">💡 产品创意列表（评审员历史）</div>
            <div class="ideas-list">${renderIdeas(globalIdeas)}</div>
            ` : ''}

            <!-- 飞书文档快捷入口 -->
            <div class="section-title">🔗 飞书文档</div>
            <div class="quick-links">${renderQuickLinks(data.feishu_links || {})}</div>
        `;

        // 初始渲染日志
        updateLog();
    }

    // ========== 渲染 Agent 卡片 ==========
    function renderAgentCards(agents, counts) {
        return ['trend_tracker','product_manager','product_reviewer','engineer'].map(key => {
            const agent  = agents[key] || {};
            const cfg    = AGENT_CONFIG[key];
            const status = agent.status || 'waiting';
            const dot    = status === 'running' ? '<span class="dot"></span>' : '';
            const cnt    = counts[key] || 0;
            const sel    = selectedAgent === key ? 'selected' : '';

            return `
            <div class="agent-card status-${status} ${sel}" onclick="toggleAgentFilter('${key}')">
                <span class="agent-emoji">${cfg.emoji}</span>
                <div class="agent-name">${agent.name || cfg.label}</div>
                <span class="status-badge ${status}">${dot}${STATUS_TEXT[status] || status}</span>
                <div class="agent-result">${agent.last_result || '尚未运行'}</div>
                ${agent.last_run ? `<div class="agent-time">上次：${formatTime(agent.last_run)} · ${cnt}条记录</div>` : ''}
            </div>`;
        }).join('');
    }

    // ========== 渲染过滤 Tab ==========
    function renderTabs(counts) {
        const total = globalLogs.length;
        const allActive = selectedAgent === null ? 'active' : '';

        let html = `<div class="agent-tab ${allActive}" onclick="toggleAgentFilter(null)">全部 <span class="tab-count">${total}</span></div>`;

        for (const [key, cfg] of Object.entries(AGENT_CONFIG)) {
            const active = selectedAgent === key ? 'active' : '';
            html += `<div class="agent-tab ${active}" onclick="toggleAgentFilter('${key}')">
                        ${cfg.emoji} ${cfg.shortName}
                        <span class="tab-count">${counts[key] || 0}</span>
                     </div>`;
        }
        return html;
    }

    // ========== 切换 Agent 过滤 ==========
    function toggleAgentFilter(agentKey) {
        // 再次点击同一个 → 取消过滤
        selectedAgent = (selectedAgent === agentKey) ? null : agentKey;
        updateLog();
        updateTabStyles();
        updateCardStyles();
    }

    function updateTabStyles() {
        document.querySelectorAll('.agent-tab').forEach((el, i) => {
            const keys = [null, ...Object.keys(AGENT_CONFIG)];
            el.classList.toggle('active', keys[i] === selectedAgent);
        });
    }

    function updateCardStyles() {
        document.querySelectorAll('.agent-card').forEach((el, i) => {
            const keys = ['trend_tracker','product_manager','product_reviewer','engineer'];
            el.classList.toggle('selected', keys[i] === selectedAgent);
        });
    }

    // ========== 更新活动日志（过滤后渲染） ==========
    function updateLog() {
        const filtered = selectedAgent
            ? globalLogs.filter(l => l.agent === selectedAgent)
            : globalLogs;

        const logEl   = document.getElementById('activityLog');
        const countEl = document.getElementById('logCount');
        if (!logEl) return;

        countEl.textContent = `显示 ${Math.min(filtered.length, 30)} / ${filtered.length} 条`;

        if (filtered.length === 0) {
            logEl.innerHTML = '<div class="log-empty">该 Agent 暂无活动记录</div>';
            return;
        }

        logEl.innerHTML = filtered.slice(0, 30).map(log => {
            const cfg = AGENT_CONFIG[log.agent] || { emoji: '🤖', badgeClass: '', shortName: '?' };
            return `
            <div class="log-item">
                <span class="log-agent-badge ${cfg.badgeClass}">${cfg.emoji} ${cfg.shortName}</span>
                <div class="log-content">
                    <div class="log-message">${escapeHtml(log.message)}</div>
                    <div class="log-time">${formatTime(log.time)}</div>
                </div>
            </div>`;
        }).join('');
    }

    // ========== 提取产品创意（从评审员日志解析） ==========
    function extractIdeas(logs) {
        const ideas = [];
        const seen = new Set();

        for (const log of logs) {
            if (log.agent !== 'product_reviewer') continue;
            // 匹配：完成评审《xxx》，评级⭐⭐⭐⭐
            const m = log.message.match(/完成评审《(.+?)》，评级(⭐+)/);
            if (m && !seen.has(m[1])) {
                seen.add(m[1]);
                ideas.push({ title: m[1], stars: m[2].length, time: log.time });
            }
        }
        return ideas;
    }

    // ========== 渲染产品创意列表 ==========
    function renderIdeas(ideas) {
        return ideas.map(idea => {
            let badgeClass = 'badge-low';
            let badgeText  = '待验证';
            if (idea.stars >= 5) { badgeClass = 'badge-5star'; badgeText = '强烈推荐'; }
            else if (idea.stars === 4) { badgeClass = 'badge-4star'; badgeText = '建议验证'; }
            else if (idea.stars === 3) { badgeClass = 'badge-3star'; badgeText = '有潜力'; }

            return `
            <div class="idea-item">
                <div class="idea-rating">${'⭐'.repeat(idea.stars)}</div>
                <div class="idea-info">
                    <div class="idea-title">${escapeHtml(idea.title)}</div>
                    <div class="idea-time">${formatTime(idea.time)}</div>
                </div>
                <span class="idea-status-badge ${badgeClass}">${badgeText}</span>
            </div>`;
        }).join('');
    }

    // ========== 渲染快捷链接 ==========
    function renderQuickLinks(links) {
        const defs = [
            { key: 'trend_doc',    icon: '📡', title: 'AI动态追踪汇总', desc: '所有AI社交方向的动态' },
            { key: 'knowledge_doc',icon: '🧠', title: 'AI社交认知沉淀', desc: '持续更新的产品方向认知框架' },
            { key: 'ideas_folder', icon: '💡', title: '产品方案文件夹', desc: '所有产品创意和评审报告' },
        ];

        return defs.map(def => {
            const url = links[def.key] || '';
            return url
                ? `<a href="${url}" target="_blank" class="quick-link">
                      <span class="link-icon">${def.icon}</span>
                      <div class="link-info">
                          <div class="link-title">${def.title}</div>
                          <div class="link-desc">${def.desc}</div>
                      </div>
                      <span class="link-arrow">→</span>
                   </a>`
                : `<div class="quick-link disabled">
                      <span class="link-icon">${def.icon}</span>
                      <div class="link-info">
                          <div class="link-title">${def.title}</div>
                          <div class="link-desc">待创建（下次运行时自动生成）</div>
                      </div>
                   </div>`;
        }).join('');
    }

    // ========== 时间格式化 ==========
    function formatTime(t) {
        if (!t) return '';
        try {
            const date = new Date(t.replace(' ', 'T'));
            const diff = Math.floor((Date.now() - date) / 60000);
            if (diff < 1)    return '刚刚';
            if (diff < 60)   return diff + '分钟前';
            if (diff < 1440) return Math.floor(diff/60) + '小时前';
            const mo = date.getMonth()+1, d = date.getDate();
            const h = String(date.getHours()).padStart(2,'0'), m = String(date.getMinutes()).padStart(2,'0');
            return `${mo}/${d} ${h}:${m}`;
        } catch(e) { return t; }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    // ========== 启动 ==========
    loadStatus();
    setInterval(loadStatus, REFRESH_INTERVAL);
</script>
</body>
</html>
